<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAPA URBEX</title>
  <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50%' x='50%' dominant-baseline='middle' text-anchor='middle' font-size='48'>🏚</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="animations.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="search-panel">
    <input type="search" id="search-input" placeholder="Buscar ciudad o pueblo..." />
    <button id="search-btn">Buscar</button>
    <button id="clear-marker-btn">Eliminar marcador</button>
    <span id="version-info">Beta v0.7.1</span>
  </div>

  <div id="urbex-hud">
    <button id="open-urbex-btn" class="btn-anim">Añadir lugares</button>
    <button id="open-todo-btn" class="btn-anim" style="margin-top: 8px;">Lista toodo</button>
  </div>

  
  <div id="changelog">
    <div class="panel-header">
      <strong>Registro de cambios</strong>
      <button class="cerrar" id="close-changelog-btn">✖</button>
    </div>
    <div class="changelog-content"></div>
  </div>

  <div id="urbex-panel">
    <div class="panel-header">
      <strong>Lugares Urbex</strong>
      <button class="cerrar" id="close-urbex-btn">✖</button>
    </div>
    <div class="urbex-input-group">
      <input type="text" id="urbex-input" placeholder="Dirección..." />
      <button id="add-urbex-btn">Añadir</button>
    </div>
    <ul id="urbex-list"></ul>
  </div>

  <div id="todo-panel" class="panel">
    <div class="panel-header">
      <strong>Lista TODO</strong>
      <button class="cerrar" id="close-todo-btn">✖</button>
    </div>
    <div class="todo-content">
      <h4>Explorados</h4>
      <ul id="explored-list" class="todo-list"></ul>
      <h4>No explorados</h4>
      <ul id="unexplored-list" class="todo-list"></ul>
    </div>
  </div>

  <div id="map"></div>

  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="main.js"></script>
  <script defer src="urbex.js"></script>
</body>
</html>
