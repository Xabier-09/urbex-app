<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MAPA URBEX</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50%' x='50%' dominant-baseline='middle' text-anchor='middle' font-size='48'>🏚</text></svg>" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="search-panel" role="search" aria-label="Buscar ciudad o pueblo">
    <input
      type="search"
      id="search-input"
      placeholder="Busca ciudad o pueblo"
      aria-describedby="search-btn"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <button id="search-btn" aria-label="Buscar">Buscar</button>
    <div id="version-info" onclick="mostrarChangelog()">
      <span id="version-text"></span>
    </div>
  </div>

  <div id="map"></div>

  <div id="changelog" class="oculto" role="dialog" aria-modal="true" aria-labelledby="changelog-title">
    <div class="changelog-header">
      <strong id="changelog-title">Registro de Cambios</strong>
      <button onclick="ocultarChangelog()" class="cerrar" aria-label="Cerrar changelog">✕</button>
    </div>
    <div id="changelog-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
